kind = "mobile"
previewPath = "/"
title = "Nord Terminal"
version = "1.0.0"
id = "artifacts/nord-terminal"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25661

[services.development]
run = "pnpm --filter @workspace/nord-terminal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nord-terminal", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nord-terminal", "run", "serve" ]

[services.env]
PORT = "25661"
BASE_PATH = "/"
